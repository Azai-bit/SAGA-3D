<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1b4285"/>
    </marker>
    <style>
      .box{fill:#f7f9fc;stroke:#1b4285;stroke-width:3;rx:12}
      .small{fill:#ffffff;stroke:#8aa0c4;stroke-width:2;rx:10}
      .title{font:700 28px Arial,sans-serif;fill:#1b4285}
      .text{font:500 22px Arial,sans-serif;fill:#27364a}
      .note{font:600 19px Arial,sans-serif;fill:#5c6f8f}
      .arrow{stroke:#1b4285;stroke-width:4;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect x="20" y="20" width="1060" height="480" fill="#ffffff" stroke="#d7dfec" stroke-width="2"/>
  <text x="550" y="62" text-anchor="middle" class="title">SAGA-3D: semantic alignment before 3D detection</text>

  <rect x="55" y="115" width="170" height="105" class="box"/>
  <text x="140" y="155" text-anchor="middle" class="text">RGB image</text>
  <text x="140" y="187" text-anchor="middle" class="note">I</text>

  <rect x="55" y="300" width="170" height="105" class="box"/>
  <text x="140" y="340" text-anchor="middle" class="text">LiDAR points</text>
  <text x="140" y="372" text-anchor="middle" class="note">xyz + intensity</text>

  <rect x="305" y="100" width="180" height="130" class="box"/>
  <text x="395" y="142" text-anchor="middle" class="text">Frozen VFM</text>
  <text x="395" y="176" text-anchor="middle" class="note">dense semantic map</text>
  <text x="395" y="205" text-anchor="middle" class="note">F_I = phi(I)</text>

  <rect x="305" y="285" width="180" height="130" class="box"/>
  <text x="395" y="327" text-anchor="middle" class="text">LiDAR MLP</text>
  <text x="395" y="361" text-anchor="middle" class="note">point semantic</text>
  <text x="395" y="390" text-anchor="middle" class="note">same feature dim</text>

  <rect x="570" y="175" width="190" height="170" class="box"/>
  <text x="665" y="218" text-anchor="middle" class="text">Semantic</text>
  <text x="665" y="250" text-anchor="middle" class="text">consistency</text>
  <text x="665" y="287" text-anchor="middle" class="note">cosine similarity</text>
  <text x="665" y="318" text-anchor="middle" class="note">confidence weights</text>

  <rect x="840" y="175" width="190" height="170" class="box"/>
  <text x="935" y="218" text-anchor="middle" class="text">Refined</text>
  <text x="935" y="250" text-anchor="middle" class="text">alignment</text>
  <text x="935" y="287" text-anchor="middle" class="note">T_hat</text>
  <text x="935" y="318" text-anchor="middle" class="note">3D detector</text>

  <path d="M225 167 L305 165" class="arrow"/>
  <path d="M225 352 L305 350" class="arrow"/>
  <path d="M485 165 C535 165 535 230 570 230" class="arrow"/>
  <path d="M485 350 C535 350 535 290 570 290" class="arrow"/>
  <path d="M760 260 L840 260" class="arrow"/>

  <rect x="540" y="392" width="240" height="62" class="small"/>
  <text x="660" y="429" text-anchor="middle" class="note">Projection links image and LiDAR</text>
  <path d="M665 345 L665 392" class="arrow"/>
</svg>
