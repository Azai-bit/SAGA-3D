<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1b4285"/>
    </marker>
    <style>
      .box{fill:#f7f9fc;stroke:#1b4285;stroke-width:3;rx:12}
      .score{fill:#fff7e8;stroke:#c58a1d;stroke-width:3;rx:12}
      .good{fill:#f4fbf7;stroke:#2f8b57;stroke-width:3;rx:12}
      .title{font:700 28px Arial,sans-serif;fill:#1b4285}
      .text{font:600 22px Arial,sans-serif;fill:#27364a}
      .note{font:500 18px Arial,sans-serif;fill:#5c6f8f}
      .arrow{stroke:#1b4285;stroke-width:4;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect x="20" y="20" width="1060" height="480" fill="#ffffff" stroke="#d7dfec" stroke-width="2"/>
  <text x="550" y="62" text-anchor="middle" class="title">Confidence-aware semantic alignment loop</text>

  <rect x="60" y="125" width="175" height="125" class="box"/>
  <text x="147" y="168" text-anchor="middle" class="text">Current</text>
  <text x="147" y="200" text-anchor="middle" class="text">transform T</text>
  <text x="147" y="232" text-anchor="middle" class="note">project LiDAR</text>

  <rect x="305" y="125" width="190" height="125" class="box"/>
  <text x="400" y="168" text-anchor="middle" class="text">Image feature</text>
  <text x="400" y="200" text-anchor="middle" class="note">f_i^Image = F_I(u_i)</text>
  <text x="400" y="232" text-anchor="middle" class="note">sampled by projection</text>

  <rect x="305" y="315" width="190" height="105" class="good"/>
  <text x="400" y="357" text-anchor="middle" class="text">LiDAR feature</text>
  <text x="400" y="390" text-anchor="middle" class="note">f_i^LiDAR = MLP(q_i)</text>

  <rect x="590" y="205" width="175" height="125" class="score"/>
  <text x="677" y="248" text-anchor="middle" class="text">Similarity</text>
  <text x="677" y="282" text-anchor="middle" class="note">S_i = cosine</text>
  <text x="677" y="312" text-anchor="middle" class="note">w_i confidence</text>

  <rect x="835" y="205" width="190" height="125" class="box"/>
  <text x="930" y="245" text-anchor="middle" class="text">Update T</text>
  <text x="930" y="280" text-anchor="middle" class="note">minimize -sum w_i S_i</text>
  <text x="930" y="310" text-anchor="middle" class="note">return refined T_hat</text>

  <path d="M235 188 L305 188" class="arrow"/>
  <path d="M495 188 C540 188 540 238 590 245" class="arrow"/>
  <path d="M495 368 C545 368 545 302 590 292" class="arrow"/>
  <path d="M765 268 L835 268" class="arrow"/>
  <path d="M930 205 C930 95 150 92 147 125" class="arrow"/>
</svg>
