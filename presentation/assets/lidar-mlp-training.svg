<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#1b4285"/>
    </marker>
    <style>
      .box{fill:#f7f9fc;stroke:#1b4285;stroke-width:3;rx:12}
      .teacher{fill:#eef5ff;stroke:#2e6eb5;stroke-width:3;rx:12}
      .student{fill:#f4fbf7;stroke:#2f8b57;stroke-width:3;rx:12}
      .loss{fill:#fff7e8;stroke:#c58a1d;stroke-width:3;rx:12}
      .title{font:700 28px Arial,sans-serif;fill:#1b4285}
      .text{font:600 22px Arial,sans-serif;fill:#27364a}
      .note{font:500 18px Arial,sans-serif;fill:#5c6f8f}
      .arrow{stroke:#1b4285;stroke-width:4;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect x="20" y="20" width="1060" height="480" fill="#ffffff" stroke="#d7dfec" stroke-width="2"/>
  <text x="550" y="62" text-anchor="middle" class="title">Training LiDAR semantic MLP using stable projections</text>

  <rect x="70" y="115" width="190" height="110" class="teacher"/>
  <text x="165" y="154" text-anchor="middle" class="text">Stable projection</text>
  <text x="165" y="188" text-anchor="middle" class="note">well-aligned point-image pairs</text>

  <rect x="335" y="95" width="190" height="150" class="teacher"/>
  <text x="430" y="135" text-anchor="middle" class="text">Image teacher</text>
  <text x="430" y="170" text-anchor="middle" class="note">sample VFM feature</text>
  <text x="430" y="202" text-anchor="middle" class="note">t_i = F_I(u_i)</text>

  <rect x="70" y="310" width="190" height="110" class="student"/>
  <text x="165" y="350" text-anchor="middle" class="text">Point input</text>
  <text x="165" y="384" text-anchor="middle" class="note">q_i = [x,y,z,intensity]</text>

  <rect x="335" y="300" width="190" height="130" class="student"/>
  <text x="430" y="342" text-anchor="middle" class="text">LiDAR MLP</text>
  <text x="430" y="376" text-anchor="middle" class="note">z_i = g_theta(q_i)</text>
  <text x="430" y="407" text-anchor="middle" class="note">same dimension as VFM</text>

  <rect x="620" y="205" width="210" height="125" class="loss"/>
  <text x="725" y="248" text-anchor="middle" class="text">Feature loss</text>
  <text x="725" y="283" text-anchor="middle" class="note">maximize cosine</text>
  <text x="725" y="312" text-anchor="middle" class="note">between z_i and t_i</text>

  <rect x="890" y="205" width="150" height="125" class="box"/>
  <text x="965" y="248" text-anchor="middle" class="text">Trained</text>
  <text x="965" y="280" text-anchor="middle" class="text">semantic</text>
  <text x="965" y="312" text-anchor="middle" class="text">LiDAR MLP</text>

  <path d="M260 170 L335 170" class="arrow"/>
  <path d="M260 365 L335 365" class="arrow"/>
  <path d="M525 170 C575 170 575 235 620 245" class="arrow"/>
  <path d="M525 365 C575 365 575 300 620 290" class="arrow"/>
  <path d="M830 268 L890 268" class="arrow"/>
</svg>
